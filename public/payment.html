<h2>Payment Page</h2>

<button onclick="pay()">Pay Now</button>

<script>
function pay(){
fetch("/api/orders/create",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
productId:localStorage.getItem("productId"),
status:"Paid"
})
}).then(res=>res.text()).then(()=>{
alert("Order Confirmed")
})
}
</script>
