<h2>Products</h2>

<div id="products"></div>

<script>
fetch("/api/products")
.then(res=>res.json())
.then(data=>{
data.forEach(p=>{
document.getElementById("products").innerHTML+=`
<div>
<h3>${p.name}</h3>
<p>${p.price}</p>
<button onclick="buy('${p._id}')">Buy</button>
</div>
`
})
})

function buy(id){
localStorage.setItem("productId",id)
window.location="payment.html"
}
</script>
